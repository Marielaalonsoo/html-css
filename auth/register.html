<!DOCTYPE HTML>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principal</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>App Padel</h1>
        <nav>
            <a href="index.html">Principal</a>
            <a href="login.html">Identifícate</a>
            <a href="reservas.html">Reservas</a>
    
        </nav>
    </header>

     <main>
        <section>
            <p>En esta página se puede realizar un pedido de productos del Atlético de Madrid mediante un formulario.</p>
        </section>

        <section>
    

            <form action="#" method="post">

                <h2>Creación de una nueva cuenta</h2>
                <fieldset>
                    <legend>Introduce tus datos</legend>

                    <p>
                        <label for="name_id">Nombre:</label><br>
                        <input type="text" id="name_id" name="nombre">
                    </p>

                    <p>
                        <label for="apellido_id">Apellido:</label><br>
                        <input type="text" id="apellido_id" name="apellido">
                    </p>

                    <p>
                        <label for="email_id">Email:</label><br>
                        <input type="email" id="email_id" name="email" required>
                    </p>
                    <p>
                        <label for="phone_id">Teléfono:</label><br>
                        <input type="tel" id="phone_id" name="telefono">
                    </p>

                    <p>
                        <label for="contrasena_id">Contraseña:</label><br>
                        <input type="text" id="contrasena_id" name="contrasena">
                    </p>
                </fieldset>

            </form>


        </section>
    </main>



    
</body>

</html>
