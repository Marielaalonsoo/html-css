<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrar Pistas | PistaPadel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="admin-header">
    <div class="container header-flex">
      <h1 class="logo-text">PistaPadel Admin</h1>

      <nav class="navbar">
        <ul class="nav-list">
          <li><a href="admin-dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="admin-courts.html" class="nav-link active">Pistas</a></li>
          <li><a href="admin-users.html" class="nav-link">Usuarios</a></li>
          <li><a href="admin-reservations.html" class="nav-link">Reservas</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="admin-main">
    <section class="container page-header">
      <h2>Gestión de Pistas</h2>
      <p>Crear, editar y desactivar pistas del sistema.</p>
    </section>

    <section class="container admin-grid-2">
      <article class="admin-panel">
        <div class="panel-header">
          <h3>Nueva pista</h3>
        </div>

        <form id="createCourtForm" class="admin-form">
          <div class="form-group">
            <label for="courtName">Nombre</label>
            <input type="text" id="courtName" name="nombre" placeholder="Ej: Pista Central" required />
          </div>

          <div class="form-group">
            <label for="courtLocation">Ubicación</label>
            <input type="text" id="courtLocation" name="ubicacion" placeholder="Ej: Zona Norte" required />
          </div>

          <div class="form-group">
            <label for="courtPrice">Precio por hora</label>
            <input type="number" id="courtPrice" name="precioHora" placeholder="Ej: 20" min="0" required />
          </div>

          <div class="form-group">
            <label for="courtCreatedDate">Fecha de alta</label>
            <input type="date" id="courtCreatedDate" name="fechaAlta" required />
          </div>

          <div class="form-group">
            <label for="courtActive">Estado</label>
            <select id="courtActive" name="activa" required>
              <option value="true">Activa</option>
              <option value="false">Inactiva</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary">Crear pista</button>
        </form>
      </article>

      <article class="admin-panel">
        <div class="panel-header">
          <h3>Editar pista</h3>
        </div>

        <form id="editCourtForm" class="admin-form">
          <div class="form-group">
            <label for="editCourtId">ID pista</label>
            <input type="number" id="editCourtId" name="courtId" placeholder="Selecciona una pista de la tabla" required />
          </div>

          <div class="form-group">
            <label for="editCourtName">Nombre</label>
            <input type="text" id="editCourtName" name="nombre" placeholder="Nuevo nombre" />
          </div>

          <div class="form-group">
            <label for="editCourtLocation">Ubicación</label>
            <input type="text" id="editCourtLocation" name="ubicacion" placeholder="Nueva ubicación" />
          </div>

          <div class="form-group">
            <label for="editCourtPrice">Precio por hora</label>
            <input type="number" id="editCourtPrice" name="precioHora" min="0" placeholder="Nuevo precio" />
          </div>

          <div class="form-group">
            <label for="editCourtActive">Estado</label>
            <select id="editCourtActive" name="activa">
              <option value="">No cambiar</option>
              <option value="true">Activa</option>
              <option value="false">Inactiva</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
            <button type="button" class="btn btn-danger" id="deleteCourtBtn">Desactivar / borrar pista</button>
          </div>
        </form>
      </article>
    </section>

    <section class="container admin-panel">
      <div class="panel-header panel-header-between">
        <h3>Listado de pistas</h3>

        <div class="filters-inline">
          <label for="filterCourtStatus" class="sr-only">Filtrar por estado</label>
          <select id="filterCourtStatus">
            <option value="">Todas</option>
            <option value="true">Activas</option>
            <option value="false">Inactivas</option>
          </select>

          <button class="btn btn-secondary" id="loadCourtsBtn">Actualizar lista</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Ubicación</th>
              <th>Precio/hora</th>
              <th>Estado</th>
              <th>Fecha alta</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="courtsTableBody">
            <tr>
              <td colspan="7">Aquí se cargarán las pistas.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
