<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi perfil | Pista de Pádel</title>
  <link rel="stylesheet" href="../estilo/css/index.css">
  <link rel="stylesheet" href="../estilo/css/paginas/profile.css">
</head>
<body>
  <header class="header">
    <div class="logo">
      <h1>Club de Pádel Comillas</h1>
    </div>

    <nav class="nav">
      <a href="../index.html">Inicio</a>
      <a href="./pistas.html">Pistas</a>
      <a href="./reservas.html">Reservas</a>
      <a href="./profile.html">Perfil</a>
      <a href="./auth/login.html">Iniciar sesión</a>
    </nav>
  </header>

  <main class="container profile-section">
    <section class="card profile-card">
      <h2>Datos de la cuenta</h2>
      <p class="form-text">Consulta y modifica tu información personal.</p>

      <div id="profileMessage" class="message"></div>

      <form id="profileForm" class="form-grid">
        <div class="form-group">
          <label for="userId">ID usuario</label>
          <input type="text" id="userId" disabled />
        </div>

        <div class="form-group">
          <label for="role">Rol</label>
          <input type="text" id="role" disabled />
        </div>

        <div class="form-group">
          <label for="createdAt">Fecha de registro</label>
          <input type="text" id="createdAt" disabled />
        </div>

        <div class="form-group">
          <label for="active">Estado</label>
          <input type="text" id="active" disabled />
        </div>

        <div class="form-group">
          <label for="firstName">Nombre</label>
          <input type="text" id="firstName" required />
        </div>

        <div class="form-group">
          <label for="lastName">Apellidos</label>
          <input type="text" id="lastName" required />
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="phone">Teléfono</label>
          <input type="tel" id="phone" />
        </div>

        <div class="profile-button full-width">
          <button type="submit">Guardar cambios</button>
        </div>
      </form>
    </section>
  </main>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/profile.js"></script>
</body>
</html>
